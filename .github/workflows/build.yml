name: Build installers

# Builds the Windows .exe and macOS .dmg in the cloud.
# - push to main / manual run: builds and uploads installers as run artifacts.
# - push a version tag (e.g. v1.1.0): also publishes installers + auto-update
#   metadata (latest.yml) to a GitHub Release, which is what powers auto-update.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      # Run Windows then macOS ONE AT A TIME. Running both in parallel makes the
      # two electron-builder publish steps race and create duplicate GitHub
      # Releases (a published one + a draft, with assets split). Serializing
      # means the macOS job finds the release the Windows job already created
      # and uploads its assets to that same one => a single clean release.
      max-parallel: 1
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      # On a version tag, publish to a GitHub Release; otherwise just build.
      PUBLISH: ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Call the tools directly via node (avoids pnpm's pre-run dependency check).
      - name: Type-check
        run: node node_modules/typescript/bin/tsc -b

      - name: Build web bundle
        run: node node_modules/vite/bin/vite.js build

      - name: Package Windows installer
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node node_modules/electron-builder/out/cli/cli.js --win --publish ${{ env.PUBLISH }}

      - name: Package macOS installer
        if: matrix.os == 'macos-latest'
        # No Apple signing certificate, so disable auto-signing (app still runs;
        # Mac users right-click > Open the first time, like Windows SmartScreen).
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node node_modules/electron-builder/out/cli/cli.js --mac --publish ${{ env.PUBLISH }}

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evensen-hub-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
          if-no-files-found: ignore
