name: Build installers

# Builds the Windows .exe and macOS .dmg in the cloud.
# - push to main / manual run: builds and uploads installers as run artifacts.
# - push a version tag (e.g. v1.1.5): a SEPARATE single job collects every
#   platform's artifacts and assembles ONE GitHub Release from them.
#
# Why a separate release job: letting each matrix job (Windows + macOS) publish
# its own release via electron-builder races and produces duplicate/split
# releases — even serialized. So the matrix only BUILDS (--publish never) and a
# single job publishes once. One publisher => exactly one release.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Call the tools directly via node (avoids pnpm's pre-run dependency check).
      - name: Type-check
        run: node node_modules/typescript/bin/tsc -b

      - name: Build web bundle
        run: node node_modules/vite/bin/vite.js build

      # --publish never: build the installer + auto-update metadata (latest.yml)
      # into release/, but do NOT create a GitHub Release here.
      - name: Package Windows installer
        if: matrix.os == 'windows-latest'
        run: node node_modules/electron-builder/out/cli/cli.js --win --publish never

      - name: Package macOS installer
        if: matrix.os == 'macos-latest'
        # No Apple signing certificate, so disable auto-signing (app still runs;
        # Mac users right-click > Open the first time, like Windows SmartScreen).
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: node node_modules/electron-builder/out/cli/cli.js --mac --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.blockmap
            release/*.yml
          if-no-files-found: ignore

  # Single publisher: runs only on a version tag, after BOTH builds finish.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show collected files
        run: find artifacts -type f | sort

      - name: Publish single GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
          draft: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
